@if (auth.isAuthenticated()) {
  <header class="topbar">
    <div class="bar-inner">
      <a routerLink="/" class="logo">🌳 פורום משפחת פולוק</a>
      <nav class="links">
        <a routerLink="/">הפורום</a>
        <a routerLink="/rules">תקנון</a>
      </nav>
      <form class="search" (ngSubmit)="search()">
        <input name="q" [(ngModel)]="searchTerm" placeholder="🔍 חיפוש בפורום" aria-label="חיפוש" />
      </form>
      <div class="user">
        <a class="hi" [routerLink]="['/member', auth.displayName()]">שלום, {{ auth.displayName() }}</a>
        @if (auth.isAdmin()) { <span class="admin-tag">מנהל</span> }
        <button (click)="logout()">יציאה</button>
      </div>
    </div>
  </header>
}

<main>
  <router-outlet />
</main>

@if (auth.isAuthenticated()) {
  <footer class="foot">
    אזור פרטי למשפחה בלבד · אין לשתף תכנים מחוץ לפורום
  </footer>
}
