@if (auth.isAuthenticated()) {
  <header class="topbar">
    <div class="bar-inner">
      <a routerLink="/" class="logo">🌳 פורום משפחת פולוק</a>
      <nav class="links">
        <a routerLink="/">הפורום</a>
        <a routerLink="/rules">תקנון</a>
      </nav>
      <div class="user">
        <span class="hi">שלום, {{ auth.displayName() }}</span>
        @if (auth.isAdmin()) { <span class="admin-tag">מנהל</span> }
        <button (click)="logout()">יציאה</button>
      </div>
    </div>
  </header>
}

<main>
  <router-outlet />
</main>

@if (auth.isAuthenticated()) {
  <footer class="foot">
    אזור פרטי למשפחה בלבד · אין לשתף תכנים מחוץ לפורום
  </footer>
}
